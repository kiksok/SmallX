panel:
  provider: xboard
  base_url: "https://panel.example.com"
  token: "replace-with-xboard-server-token"
  node_id: 1
  node_type: shadowsocks
  timeout: 10s

sync:
  pull_interval: 60s
  status_interval: 60s

runtime:
  adapter: ss-native
  work_dir: ./run
  apply_timeout: 15s
  default_tcp_conn_limit: 0
  enforce_device_limit: true
  allow_targets: []
  block_targets: []

passx:
  enabled: false
  trusted_cidrs: []

log:
  level: info
